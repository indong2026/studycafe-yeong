<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>영글터 좌석</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>영글터 좌석 선택</h1>

    <div class="login-box">
<p id="reserveTimeInfo"></p>
        <input
            id="idInput"
            type="text"
            placeholder="학번 예)20901">

        <input
            id="pwInput"
            type="password"
            placeholder="비밀번호">

        <button id="signupBtn">
            회원가입
        </button>

        <button id="loginBtn">
            로그인
        </button>

        <button id="changePwBtn">
                비밀번호 변경
            </button>

            <button id="adminBtn" style="display:none;">
                관리자 메뉴
            </button>

    </div>

    <p id="mySeatText">
        로그인 해주세요.
    </p>

    

    <div id="studyRoom" class="yeong-room">

  <div class="desk">1</div>
  <div class="desk">2</div>
  <div class="desk">3</div>
  <div class="desk">4</div>
  <div class="desk">5</div>
  <div class="desk">6</div>
  <div class="desk">7</div>
  <div class="desk">8</div>

  <div></div>
  <div class="door"> ㅤㅤㅤㅤ문 </div>
  <div></div>
  <div></div>
  <div></div>
  <div></div>
  <div class="door"> ㅤㅤㅤㅤ문</div>
  <div></div>

</div>

    <p id="message">
        좌석을 선택하세요.
    </p>

    <div
        id="popup"
        class="popup hidden">

        <div class="popup-box">

            <p id="popupText">
                자리를 예약하시겠습니까?
            </p>

            <label>
    사용 시간 선택
</label>

<br><br>

<select id="sessionSelect">

    <option value="part1">
        야자 1부 (18:00~20:00)
    </option>

    <option value="part2">
        야자 2부 (20:10~21:30)
    </option>

    <option value="both">
        야자 1부 + 2부
    </option>

</select>

            <br><br>

            <button id="reserveBtn">
                예약하기
            </button>

            <button id="cancelBtn">
                취소
            </button>

            

            

        </div>

    </div>
    <div id="adminPopup" class="popup hidden">

  <div class="popup-box">

    <h3>관리자 메뉴</h3>

    <button id="adminCancelSeatBtn">
      강제 예약 취소
    </button>

    <button id="adminAddTicketBtn">
      예약권 추가
    </button>

    <button id="adminDeleteUserBtn">
      계정 삭제
    </button>

    <button id="adminCloseBtn">
      닫기
    </button>

  </div>

</div>

    <script
        type="module"
        src="script.js">
    </script>

  </div>

</div>
</body>
</html>
